[plugin]
enabled = true
config_version = "0.1.4"
slixmpp_log_level = "INFO"

[xmpp_server]
host = "127.0.0.1"
port = 5222
jid = "bot@example.com"
# ⚠️ 请修改为实际密码，勿在版本控制中保留真实凭据
password = "your_password"
resource = "maibot"
use_tls = true
heartbeat_interval = 0.0
reconnect_delay_sec = 5.0
action_timeout_sec = 15.0
connection_id = ""
muc_rooms = ["chatroom@conference.rtc.com"]
muc_nickname = "maibot"

[chat]
enable_chat_list_filter = true
show_dropped_chat_list_messages = false
group_list_type = "blacklist"
group_list = []
private_list_type = "blacklist"
private_list = []
ban_user_id = []

[filters]
ignore_self_message = true
regex_filter_enabled = false
regex_filter_mode = "blacklist"
regex_filter_patterns = []
regex_filter_show_dropped = false
